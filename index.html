<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Key Dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #151b23;
    --border: #2a3038;
    --text: #e6edf3;
    --muted: #8b949e;
    --green: #4caf6e;
    --amber: #d9a441;
    --red: #d9534f;
    --accent: #4caf6e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', Roboto, sans-serif;
    padding: 24px 16px 60px;
  }
  h1 {
    font-size: 22px;
    margin: 0 0 4px;
    letter-spacing: 0.5px;
  }
  .sub {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 24px;
  }
  .config {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 20px;
    display: none;
  }
  .config.show { display: block; }
  .config input {
    width: 100%;
    background: #0d1117;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 6px;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .config button {
    background: var(--green);
    border: none;
    color: #0d1117;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 13px;
  }
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .gear {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
  }
  .refresh {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .key-name {
    font-weight: 600;
    font-size: 15px;
  }
  .ratio {
    font-size: 14px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .bar-track {
    background: #20262e;
    border-radius: 4px;
    height: 6px;
    margin: 10px 0;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
  }
  .meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
  }
  .status {
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
  }
  .status.active { background: rgba(76,175,110,0.15); color: var(--green); }
  .status.expired { background: rgba(217,83,79,0.15); color: var(--red); }
  .devices {
    margin-top: 10px;
    font-size: 11px;
    color: var(--muted);
    word-break: break-all;
    border-top: 1px solid var(--border);
    padding-top: 8px;
    display: none;
  }
  .card.open .devices { display: block; }
  .empty, .loading {
    color: var(--muted);
    text-align: center;
    padding: 40px 0;
    font-size: 13px;
  }
</style>
</head>
<body>

<h1>Key Dashboard</h1>
<div class="sub" id="lastUpdated">Loading...</div>

<div class="toolbar">
  <button class="gear" onclick="toggleConfig()">⚙ Setup</button>
  <button class="refresh" onclick="loadKeys()">⟳ Refresh</button>
</div>

<div class="config" id="configBox">
  <input id="binId" placeholder="Bin ID">
  <input id="masterKey" placeholder="X-Master-Key">
  <button onclick="saveConfig()">Save & Load</button>
</div>

<div id="list" class="loading">Set up your Bin ID and Master Key to begin.</div>

<script>
function toggleConfig() {
  document.getElementById('configBox').classList.toggle('show');
}

function saveConfig() {
  const binId = document.getElementById('binId').value.trim();
  const masterKey = document.getElementById('masterKey').value.trim();
  if (!binId || !masterKey) { alert('Fill in both fields'); return; }
  localStorage.setItem('binId', binId);
  localStorage.setItem('masterKey', masterKey);
  document.getElementById('configBox').classList.remove('show');
  loadKeys();
}

function isExpired(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const expTime = new Date(y, m - 1, d, 20, 0, 0).getTime();
  return Date.now() >= expTime;
}

function toggleCard(el) {
  el.classList.toggle('open');
}

async function loadKeys() {
  const binId = localStorage.getItem('binId');
  const masterKey = localStorage.getItem('masterKey');
  const list = document.getElementById('list');

  if (!binId || !masterKey) {
    list.innerHTML = '<div class="empty">Set up your Bin ID and Master Key to begin.</div>';
    return;
  }

  list.innerHTML = '<div class="loading">Fetching keys...</div>';

  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
      headers: {
        'X-Master-Key': masterKey,
        'X-Bin-Meta': 'false'
      }
    });
    if (!res.ok) throw new Error('Request failed');
    const data = await res.json();
    renderKeys(data.keys || []);
    document.getElementById('lastUpdated').textContent =
      'Updated ' + new Date().toLocaleTimeString();
  } catch (err) {
    list.innerHTML = '<div class="empty">Could not load data. Check your Bin ID and Master Key.</div>';
  }
}

function renderKeys(keys) {
  const list = document.getElementById('list');
  if (!keys.length) {
    list.innerHTML = '<div class="empty">No keys found in this bin.</div>';
    return;
  }

  list.innerHTML = '';
  keys.forEach(k => {
    const devices = k.devices || [];
    const max = k.deviceLimit || 1;
    const used = devices.length;
    const pct = Math.min(100, Math.round((used / max) * 100));
    const expired = isExpired(k.expiration);

    let barColor = 'var(--green)';
    if (pct >= 100) barColor = 'var(--red)';
    else if (pct >= 70) barColor = 'var(--amber)';

    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => toggleCard(card);
    card.innerHTML = `
      <div class="card-top">
        <span class="key-name">${k.key}</span>
        <span class="ratio">${used}/${max}</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct}%; background:${barColor};"></div>
      </div>
      <div class="meta">
        <span>Expires ${k.expiration}</span>
        <span class="status ${expired ? 'expired' : 'active'}">${expired ? 'Expired' : 'Active'}</span>
      </div>
      <div class="devices">${devices.length ? devices.join('<br>') : 'No devices logged in yet.'}</div>
    `;
    list.appendChild(card);
  });
}

window.onload = () => {
  const binId = localStorage.getItem('binId');
  const masterKey = localStorage.getItem('masterKey');
  if (binId) document.getElementById('binId').value = binId;
  if (masterKey) document.getElementById('masterKey').value = masterKey;
  loadKeys();
};
</script>

</body>
</html>
